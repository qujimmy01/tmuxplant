<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TmuxPlant — Tmux Web Manager</title>
    <meta name="description"
        content="A beautiful web-based tmux session management interface with real-time terminal access">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <div class="logo">
                    <span class="logo-icon">🌿</span>
                    <h1 class="logo-text">TmuxPlant</h1>
                </div>
            </div>
            <div class="header-center">
                <div class="status-indicator" id="connectionStatus">
                    <span class="status-dot"></span>
                    <span class="status-text">Connected</span>
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn" id="btnNewSession" title="New Session">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    <span>New Session</span>
                </button>
                <button class="header-btn" id="btnBroadcast" title="Broadcast Command">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z" />
                        <path
                            d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z" />
                        <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0" />
                        <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5" />
                    </svg>
                    <span>Broadcast</span>
                </button>
                <a class="header-btn" href="/cli" title="Open CLI Tool">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="4 17 10 11 4 5" />
                        <line x1="12" y1="19" x2="20" y2="19" />
                    </svg>
                    <span>CLI Tool</span>
                </a>
                <button class="header-btn icon-only" id="btnRefresh" title="Refresh Sessions">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10" />
                        <polyline points="1 20 1 14 7 14" />
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2 class="sidebar-title">Sessions</h2>
                    <span class="session-count" id="sessionCount">0</span>
                </div>
                <div class="session-tree" id="sessionTree">
                    <div class="empty-state">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="1" opacity="0.3">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                            <line x1="3" y1="9" x2="21" y2="9" />
                            <line x1="9" y1="21" x2="9" y2="9" />
                        </svg>
                        <p>No tmux sessions found</p>
                        <button class="btn-small" onclick="app.showNewSessionModal()">Create Session</button>
                    </div>
                </div>

                <div class="sidebar-header" style="margin-top: 16px;">
                    <h2 class="sidebar-title">SSH Hosts</h2>
                    <button class="icon-only" onclick="app.showAddSshModal()" title="Add SSH Host"
                        style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;">+</button>
                </div>
                <div class="session-tree" id="sshTree">
                    <!-- SSH hosts will go here -->
                </div>
                <div class="sidebar-resize-handle" id="sidebarResizeHandle"></div>
            </aside>

            <!-- Terminal Area -->
            <main class="terminal-area" id="terminalArea">
                <!-- Welcome Screen (shown when no terminal is active) -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-content">
                        <div class="welcome-logo">🌿</div>
                        <h2>Welcome to TmuxPlant</h2>
                        <p>Select a pane from the sidebar to open a terminal, or create a new session to get started.
                        </p>
                        <div class="welcome-shortcuts">
                            <div class="shortcut-item">
                                <kbd>Click Pane</kbd>
                                <span>Open Terminal</span>
                            </div>
                            <div class="shortcut-item">
                                <kbd>Right Click</kbd>
                                <span>Context Menu</span>
                            </div>
                            <div class="shortcut-item">
                                <kbd>Double Click</kbd>
                                <span>Rename</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Terminal Tabs -->
                <div class="terminal-tabs" id="terminalTabs" style="display:none">
                    <!-- Tabs will be dynamically inserted here -->
                </div>

                <!-- Terminal Container -->
                <div class="terminal-container" id="terminalContainer" style="display:none">
                    <!-- xterm.js terminals will be mounted here -->
                </div>

                <!-- Status Bar -->
                <div class="status-bar" id="statusBar" style="display:none">
                    <div class="status-left">
                        <span class="status-item" id="statusSession">—</span>
                        <span class="status-sep">›</span>
                        <span class="status-item" id="statusWindow">—</span>
                        <span class="status-sep">›</span>
                        <span class="status-item" id="statusPane">—</span>
                    </div>
                    <div class="status-right">
                        <span class="status-item" id="statusSize">—</span>
                        <span class="status-item" id="statusCommand">—</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">Dialog</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content -->
            </div>
            <div class="modal-footer" id="modalFooter">
                <button class="btn btn-secondary" id="modalCancel">Cancel</button>
                <button class="btn btn-primary" id="modalConfirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">
        <!-- Dynamic items -->
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
    <script src="/js/app.js"></script>
</body>

</html>
